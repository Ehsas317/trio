<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trio Project Dashboard - Mac Mini M4</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --accent: #38bdf8;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --border: #334155;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            padding: 2rem;
        }
        .container { max-width: 960px; margin: 0 auto; }
        h1 { font-size: 1.875rem; margin-bottom: 1.5rem; color: var(--accent); }
        .grid { display: grid; gap: 1.5rem; grid-template-columns: 1fr; }
        @media (min-width: 768px) { .grid { grid-template-columns: 1fr 1fr; } }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 1.5rem;
        }
        .card h2 { font-size: 1.125rem; margin-bottom: 1rem; color: var(--accent); }
        .stat { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid var(--border); }
        .stat:last-child { border-bottom: none; }
        .stat-label { color: var(--muted); }
        .stat-value { font-weight: 600; font-variant-numeric: tabular-nums; }
        .assistant-card { margin-bottom: 1rem; padding: 1rem; background: rgba(255,255,255,0.03); border-radius: 0.5rem; }
        .assistant-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
        .assistant-name { font-size: 1.125rem; font-weight: 700; text-transform: uppercase; }
        .status { font-size: 0.875rem; padding: 0.25rem 0.75rem; border-radius: 9999px; font-weight: 600; }
        .status-idle { background: rgba(148,163,184,0.2); color: var(--muted); }
        .status-active { background: rgba(34,197,94,0.2); color: var(--success); }
        .status-paused { background: rgba(245,158,11,0.2); color: var(--warning); }
        .status-error { background: rgba(239,68,68,0.2); color: var(--danger); }
        .task-info { color: var(--muted); font-size: 0.875rem; margin: 0.5rem 0; }
        .controls { display: flex; gap: 0.5rem; }
        .btn {
            padding: 0.375rem 1rem;
            border: none;
            border-radius: 0.375rem;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.85; }
        .btn-start { background: var(--success); color: white; }
        .btn-stop { background: var(--danger); color: white; }
        .footer { margin-top: 2rem; text-align: center; color: var(--muted); font-size: 0.75rem; }
        .error { color: var(--danger); font-size: 0.875rem; }
        #last-updated { text-align: right; color: var(--muted); font-size: 0.75rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Trio Project Dashboard</h1>
        <div id="last-updated">Loading...</div>

        <div class="grid">
            <div class="card">
                <h2>System Status</h2>
                <div id="system-status"><p>Loading...</p></div>
            </div>
            <div class="card">
                <h2>Assistant Status</h2>
                <div id="assistant-status"><p>Loading...</p></div>
            </div>
        </div>

        <div class="card" style="margin-top: 1.5rem;">
            <h2>Knowledge Base</h2>
            <div class="stat">
                <span class="stat-label">Stored Documents</span>
                <span class="stat-value" id="vector-count">-</span>
            </div>
        </div>

        <div class="footer">
            <p>Trio AI Ecosystem v2.0 | Mac Mini M4 Optimized</p>
        </div>
    </div>

    <script>
        async function fetchStatus() {
            try {
                const res = await fetch("/api/status");
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                updateDashboard(data);
                document.getElementById("last-updated").textContent = `Updated: ${new Date().toLocaleTimeString()}`;
            } catch (err) {
                console.error("Fetch error:", err);
                document.getElementById("last-updated").textContent = "Update failed";
            }
        }

        function updateDashboard(data) {
            const sysDiv = document.getElementById("system-status");
            if (data.system && !data.system.error) {
                sysDiv.innerHTML = `
                    <div class="stat"><span class="stat-label">CPU</span><span class="stat-value">${data.system.cpu_percent?.toFixed(1) ?? "N/A"}%</span></div>
                    <div class="stat"><span class="stat-label">RAM Used</span><span class="stat-value">${data.system.ram_used_mb ?? "N/A"} MB</span></div>
                    <div class="stat"><span class="stat-label">RAM Total</span><span class="stat-value">${data.system.ram_total_mb ?? "N/A"} MB</span></div>
                    <div class="stat"><span class="stat-label">RAM %</span><span class="stat-value">${data.system.ram_percent ?? "N/A"}%</span></div>
                    <div class="stat"><span class="stat-label">Wired</span><span class="stat-value">${data.system.wired_mb ?? "N/A"} MB</span></div>
                    <div class="stat"><span class="stat-label">Active</span><span class="stat-value">${data.system.active_mb ?? "N/A"} MB</span></div>
                    <div class="stat"><span class="stat-label">Compressed</span><span class="stat-value">${data.system.compressed_mb ?? "N/A"} MB</span></div>
                `;
            } else {
                sysDiv.innerHTML = `<p class="error">${data.system?.error || "Unavailable"}</p>`;
            }

            const astDiv = document.getElementById("assistant-status");
            if (data.assistants && Object.keys(data.assistants).length > 0) {
                let html = "";
                for (const [name, a] of Object.entries(data.assistants)) {
                    const statusClass = `status-${a.status}`;
                    const showStart = a.status === "idle" || a.status === "error";
                    const showStop = a.status === "active" || a.status === "paused";
                    html += `
                        <div class="assistant-card">
                            <div class="assistant-header">
                                <span class="assistant-name">${name.toUpperCase()}</span>
                                <span class="status ${statusClass}">${a.status}</span>
                            </div>
                            ${a.task ? `<div class="task-info">${a.task} (${a.progress})</div>` : ""}
                            <div class="controls">
                                <form action="/control" method="post" style="display:inline">
                                    <input type="hidden" name="assistant" value="${name}">
                                    ${showStart ? `<input type="hidden" name="action" value="start"><button type="submit" class="btn btn-start">Start</button>` : ""}
                                    ${showStop ? `<input type="hidden" name="action" value="stop"><button type="submit" class="btn btn-stop">Stop</button>` : ""}
                                </form>
                            </div>
                        </div>
                    `;
                }
                astDiv.innerHTML = html;
            } else {
                astDiv.innerHTML = `<p class="error">${data.error || "No assistant data"}</p>`;
            }

            document.getElementById("vector-count").textContent = data.vector_store_count ?? "-";
        }

        fetchStatus();
        setInterval(fetchStatus, {{ refresh_interval }} * 1000);
    </script>
</body>
</html>
